services:
  app:
    build:
      context: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - app_public:/var/www/html/public

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/html/public:ro
    depends_on:
      - app

volumes:
  app_public:
