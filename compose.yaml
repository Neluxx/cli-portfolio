services:
    app:
        build:
            context: .
        image: ${APP_IMAGE:-laravel-app}:latest
        restart: unless-stopped
        env_file: .env
        environment:
            DB_DATABASE: /var/www/html/database/data/database.sqlite
        volumes:
            - app-storage:/var/www/html/storage
            - app-public:/var/www/html/public
            - app-database:/var/www/html/database/data
        healthcheck:
            test: ["CMD-SHELL", "nc -z 127.0.0.1 9000 || exit 1"]
            interval: 10s
            timeout: 3s
            retries: 5
            start_period: 30s
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        networks:
            - backend

    nginx:
        image: nginx:alpine
        restart: unless-stopped
        depends_on:
            app:
                condition: service_healthy
        ports:
            - "127.0.0.1:8080:80"
        volumes:
            - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
            - app-public:/var/www/html/public:ro
        healthcheck:
            test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
            interval: 10s
            timeout: 3s
            retries: 5
            start_period: 10s
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        networks:
            - backend

volumes:
    app-storage:
    app-public:
    app-database:

networks:
    backend:
