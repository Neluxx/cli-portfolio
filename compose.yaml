services:
    app:
        build:
            context: .
        image: ${APP_IMAGE:-laravel-app}:latest
        restart: unless-stopped
        env_file: .env
        environment:
            DB_DATABASE: /var/www/html/database/data/database.sqlite
        volumes:
            - app-storage:/var/www/html/storage
            - app-public:/var/www/html/public
            - app-database:/var/www/html/database/data
        networks:
            - backend

    nginx:
        image: nginx:alpine
        restart: unless-stopped
        depends_on:
            - app
        ports:
            - "127.0.0.1:8080:80"
        volumes:
            - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
            - app-public:/var/www/html/public:ro
        networks:
            - backend

volumes:
    app-storage:
    app-public:
    app-database:

networks:
    backend:
