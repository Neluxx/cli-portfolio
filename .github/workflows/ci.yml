name: CI

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: cli-portfolio

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up .env
        run: |
          cp .env.example .env
          sed -i 's|APP_KEY=.*|APP_KEY=|' .env

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/php.dockerfile
          tags: ${{ env.IMAGE_NAME }}:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Composer dependencies (for test runner)
        uses: php-actions/composer@v6
        with:
          php_version: "8.4"
          args: --prefer-dist --no-progress

      - name: Generate app key
        run: php artisan key:generate

      - name: Run tests
        run: php artisan test --parallel
