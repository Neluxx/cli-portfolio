name: CI

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: cli-portfolio

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/php.dockerfile
          tags: ${{ env.IMAGE_NAME }}:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_KEY=base64:placeholder==

      - name: Run tests
        run: |
          docker run --rm \
            -e APP_ENV=testing \
            -e APP_KEY=$(docker run --rm ${{ env.IMAGE_NAME }}:ci php artisan key:generate --show) \
            -e DB_DATABASE=testing \
            -e CACHE_STORE=array \
            -e SESSION_DRIVER=array \
            ${{ env.IMAGE_NAME }}:ci \
            php artisan test --parallel
