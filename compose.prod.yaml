services:
  app:
    build:
      context: .
      dockerfile: docker/php.dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - app_public:/var/www/html/public
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/html/public:ro
    depends_on:
      - app
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  app_public:
