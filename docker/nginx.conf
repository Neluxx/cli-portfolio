server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Hide nginx version from error pages and headers
    server_tokens off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"        always;
    add_header X-XSS-Protection "1; mode=block"        always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Limit upload size
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # Only pass to PHP-FPM if the file actually exists
        try_files $uri =404;

        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Prevent HTTP_PROXY header injection (httpoxy vulnerability)
        fastcgi_param HTTP_PROXY "";

        fastcgi_read_timeout 120;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Block all dotfiles and directories (e.g. .env, .git)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block direct access to sensitive file types
    location ~* \.(env|log|sqlite|sh|md|lock)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Cache static assets aggressively
    location ~* \.(ico|css|js|gif|jpg|jpeg|png|svg|woff|woff2|ttf|eot|webp)$ {
        try_files $uri /index.php?$query_string;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
